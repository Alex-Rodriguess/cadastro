<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro cliente</title>
  <link rel="stylesheet" href="https://bootswatch.com/5/flatly/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <nav class="navbar navbar-light bg-warning">
    <a href="#" class="navbar-brand">Produtos</a>
  </nav>
    <div id="container">
      <form method="post" action="" onsubmit="return enviarDados();"></form>
      <div class="table__container"></div>
      <table class="table">
        <tr>
          <div id="img-container"><img id="preview" /></div>
          <td class="table__produto">Produto:</td>
          <td><input type="text" name="produto" id="produto" /></td>
        </tr>
        <tr>
          <td class="table__codigo">Código:</td>
          <td><input type="text" name="codigo" id="codigo" /></td>
        </tr>
        <tr>
          <td class="table__quantidade">Quantidade:</td>
          <td><input type="number" name="quantidade" id="quantidade" /></td>
        </tr>
        <tr>
          <td class="table__valor">Valor:</td>
          <td>
            <input type="text" name="valor" step="0.01" id="valor" placeholder="R$" />
          </td>
        </tr>
        <tr>
          <td class="table__imagem">Imagem:</td>
          <td>
            <input type="file" name="imagem" id="img-input" />
          </td>
          <td>
            <input type="submit" value="Enviar" onclick="enviarDados()" />
          </td>
        </tr>
    
      </table>
    </div>
  </div>
  <div class="col-md-2">
    <div class="btn-produto">
      <button class="btn btn-primary" onclick="exibir();" ondblclick="ocultar();">
        Add Produto
      </button>
    </div>
    <div class="btn-cliente">
      <button class="btn btn-primary"><a class="add-cliente-link" href="#bg">Add Cliente</a>
        
      </button>
    </div>
    <div class="btn-fornecedor">
      <button class="btn btn-primary">
        Fornecedor
      </button>
    </div>
    <!--Criando um MODAL para o cadastro dos clientes-->

    <div id="bg">
    <div class="box"></div>
    <a href="" id="close">X</a>
    </div>



    <script src="./assets/JS/javascript.js"></script>
</body>

</html>
