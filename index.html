<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro cliente</title>
  <link rel="stylesheet" href="https://bootswatch.com/5/flatly/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <nav class="navbar navbar-light bg-warning">
    <a href="#" class="navbar-brand">Cadastro</a>

  </nav>

  <div class="btn-produto">
    <button class="btn btn-primary"><a class="add-produto-link" href="#bg2">Add Produto</a>
    </button>
  </div>
  <div class="btn-cliente">
    <button class="btn btn-primary"><a class="add-cliente-link" href="#bg">Add Cliente</a>
    </button>
  </div>
  <div class="btn-fornecedor">
    <button class="btn btn-primary"><a class="add-fornecedor-link" href="#bg">Add Fornecedor</a>
    </button>
  </div>


  <!--Criando um MODAL para o cadastro dos clientes-->


  <div id="bg">
    <div class="box">
      <div class="navbar-modal bg-primary">Add Cliente</div>
      <div class="form-cliente">
        <label class="col-form-label mt-4" for="nome">Nome:</label>
        <input type="text" class="form-control" placeholder="Digite o nome do cliente" id="nome" name="nome" required
          maxlength="40">
      </div>
      <div class="form-cliente">

        <label class="col-form-label mt-4">Telefone:</label>
        <input type="tel" maxlength="11" class="form-control" placeholder="Digite o telefone do cliente" id="input-tel">
      </div>
      <div class="form-cliente">
        <label class="col-form-label mt-4">CPF:</label>
        <input type="text" maxlength="11" class="form-control" placeholder="Digite o CPF do cliente" id="input-cpf">
      </div>
      <div class="form-cliente">
        <label class="col-form-label mt-4">E-mail:</label>
        <input type="email" class="form-control" placeholder="Digite o e-mail do cliente" id="input-mail">
      </div>
      <div class="form-cliente">
        <label class="col-form-label mt-4"">Endereço:</label>
        <input type=" text" class="form-control" placeholder="Digite o endereço do cliente" id="input-end">
      </div>
      <div class="btn-submit--cadastro">
        <button class="btn btn-lg btn-primary" type="button">Enviar cadastro</button>
        <a href=""><button class="btn btn-lg btn-primary" type="button">Cancelar / Sair</button></a>
      </div>
    </div>
  </div>

  <!--Criando um MODAL para o cadastro dos PRODUTOS-->
  <div id="bg2">
    <div class="box2">
      <div class="navbar-modal bg-primary">Add Produto</div>
      <div class="form-cliente">
        <label class="col-form-label mt-4">Código:</label>
        <input type="text" class="form-control" placeholder="Digite o código do produto" id="input-cod">
      </div>
      <div class="form-cliente">
        <label class="col-form-label mt-4">Nome:</label>
        <input type="tel" maxlength="11" class="form-control" placeholder="Digite o nome do produto" id="input-prod">
      </div>
      <div class="form-cliente">
        <label class="col-form-label mt-4">Descrição:</label>
        <input type="text" class="form-control" placeholder="Digite a descrição do produto" id="input-descr">
      </div>
      <div class="form-cliente">
        <label class="col-form-label mt-4">Quant:</label>
        <input type="number" class="form-control" placeholder="Insira a quantidade em estoque" id="input-qtd">
      </div>
      <div class="form-cliente">
        <label class="col-form-label mt-4">Valor:</label>
        <input type="number" class="form-control" placeholder="Insira o valor unitário" id="input-val" required
          minlength="4">
      </div>
      <div class="btn-submit--cadastro">
        <button class="btn btn-lg btn-primary" type="button" onclick="validar()">Enviar cadastro</button>
        <a href=""><button class="btn btn-lg btn-primary" type="button">Cancelar / Sair</button></a>



        <script src="./assets/JS/javascript.js"></script>
</body>

</html>
